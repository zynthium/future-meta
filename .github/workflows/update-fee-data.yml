name: update-fee-data

on:
  schedule:
    - cron: "45 18 * * *"
  workflow_dispatch:

env:
  DB_PATH: data/future-meta.sqlite
  SEED_URL: https://future-meta.pages.dev/ops/future-meta.sqlite.gz
  SEED_ARCHIVE: public/ops/future-meta.sqlite.gz

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace && cargo test -p future-meta --features download

      - name: Restore Cloudflare daemon seed
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$DB_PATH")"
          curl --fail --location --show-error "$SEED_URL" --output /tmp/future-meta.sqlite.gz
          gzip -dc /tmp/future-meta.sqlite.gz > "$DB_PATH"
          cargo run -p future-meta-daemon -- inspect --db "$DB_PATH"

      - name: Refresh data
        timeout-minutes: 20
        run: cargo run -p future-meta-daemon -- update-latest --db "$DB_PATH" --require-seed

      - name: Export Pages artifact
        run: cargo run -p future-meta-daemon -- export --db "$DB_PATH" --out public

      - name: Publish updated daemon seed
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$SEED_ARCHIVE")"
          gzip -c "$DB_PATH" > "$SEED_ARCHIVE"

      - name: Compute artifact hash
        id: artifact
        run: echo "sha=$(sha256sum public/latest.fmeta.zst | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=future-meta --branch=main --commit-dirty=true
